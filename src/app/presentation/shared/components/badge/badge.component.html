<span
  class="badge"
  [class.badge--success]="color === 'success'"
  [class.badge--warning]="color === 'warning'"
  [class.badge--info]="color === 'info'"
  [class.badge--accent]="color === 'accent'"
  [class.badge--danger]="color === 'danger'"
  [class.badge--muted]="color === 'muted'"
>
  <ng-content />
</span>
